name: agrigrow
description: An agricultural app for farmers with weather, crop health, and market information.

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  intl: ^0.18.0
  http: ^1.6.0
  image_picker: ^1.0.4
  shared_preferences: ^2.2.0
  desktop_drop: ^0.7.1
  url_launcher: ^6.1.12
  video_player: ^2.6.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
